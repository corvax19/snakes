<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snakes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: var(--text-color);
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            width: 500px;
            font-size: 22px;
            font-weight: bold;
            padding: 0 4px;
        }
        #timer { color: var(--timer-color); transition: color 0.3s; }
        #timer.warning { color: var(--warning-color); animation: pulse 0.5s infinite; }
        #level-display { color: var(--level-color); }
        #score { color: var(--score-color); font-size: 22px; font-weight: bold; }
        #rabbits-left { color: var(--rabbits-color); font-size: 22px; font-weight: bold; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        #canvas-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
        }
        canvas {
            border: 2px solid var(--border-color);
            border-radius: 4px;
            display: block;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--overlay-bg);
            border-radius: 4px;
            text-align: center;
            padding: 40px;
        }
        #overlay.hidden { display: none; }
        #overlay h1 { font-size: 36px; margin-bottom: 16px; color: var(--overlay-title); }
        #overlay p { font-size: 18px; margin-bottom: 8px; color: var(--overlay-text); }
        #overlay .highlight { color: var(--overlay-highlight); font-size: 22px; }
        #overlay .action { color: var(--overlay-action); margin-top: 12px; }
        .footer-bar {
            display: flex;
            justify-content: space-between;
            width: 500px;
            padding: 0 4px;
        }
        .theme-selector {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 16px;
        }
        .theme-btn {
            padding: 6px 12px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            background: var(--btn-bg);
            color: var(--text-color);
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.2s;
        }
        .theme-btn:hover {
            background: var(--btn-hover);
        }
        .theme-btn.active {
            background: var(--btn-active);
            border-color: var(--btn-active-border);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="info-bar">
            <span id="level-display">Level: 1</span>
            <span id="timer">Time: 1:00</span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="game" width="500" height="500"></canvas>
            <div id="overlay">
                <h1>Snakes</h1>
                <p>Eat all 10 rabbits before time runs out!</p>
                <p>Walls and your own tail are deadly.</p>
                <p class="action">Press SPACE to start</p>
            </div>
        </div>
        <div class="footer-bar">
            <span id="score">Score: 0</span>
            <span id="rabbits-left">Rabbits: 10</span>
        </div>
        <div class="theme-selector">
            <span>Theme:</span>
            <button class="theme-btn active" data-theme="night">🌙 Night</button>
            <button class="theme-btn" data-theme="day">☀️ Day</button>
        </div>
    </div>
<script>
(() => {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlayEl = document.getElementById('overlay');
    const timerEl = document.getElementById('timer');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level-display');
    const rabbitsEl = document.getElementById('rabbits-left');

    const GRID = 20;
    const CELL = 25;
    const RABBIT_COUNT = 10;
    const BASE_TIME = 60;
    const TIME_DECREASE = 10;
    const MIN_TIME = 10;
    const MOVE_INTERVAL = 130;

    // Theme definitions
    const themes = {
        night: {
            '--bg-color': '#0f0f23',
            '--text-color': '#ccc',
            '--timer-color': '#00ff88',
            '--warning-color': '#ff4444',
            '--level-color': '#ffd700',
            '--score-color': '#ff8800',
            '--rabbits-color': '#cc88ff',
            '--border-color': '#333',
            '--overlay-bg': 'rgba(15, 15, 35, 0.88)',
            '--overlay-title': '#00ff88',
            '--overlay-text': '#aaa',
            '--overlay-highlight': '#ffd700',
            '--overlay-action': '#00ff88',
            '--btn-bg': '#1a1a2e',
            '--btn-hover': '#2a2a4e',
            '--btn-active': '#00ff88',
            '--btn-active-border': '#00dd66',
            canvasBg: '#1a1a2e',
            gridColor: 'rgba(255,255,255,0.03)',
            snakeHead: '#00dd66',
            snakeBody: (ratio) => {
                const g = Math.floor(220 * ratio);
                return 'rgb(0,' + g + ',' + Math.floor(g * 0.4) + ')';
            },
            rabbitBody: '#d4a574',
            rabbitHead: '#d4a574',
            rabbitEars: '#c49464',
            rabbitInnerEars: '#ffb0b0',
            rabbitEyes: '#333',
            rabbitNose: '#ff8888',
            rabbitTail: '#fff',
            eyeWhite: '#fff',
            eyePupil: '#111'
        },
        day: {
            '--bg-color': '#f0f4f8',
            '--text-color': '#333',
            '--timer-color': '#2e7d32',
            '--warning-color': '#c62828',
            '--level-color': '#f57c00',
            '--score-color': '#1565c0',
            '--rabbits-color': '#7b1fa2',
            '--border-color': '#90a4ae',
            '--overlay-bg': 'rgba(240, 244, 248, 0.92)',
            '--overlay-title': '#2e7d32',
            '--overlay-text': '#555',
            '--overlay-highlight': '#f57c00',
            '--overlay-action': '#2e7d32',
            '--btn-bg': '#e3f2fd',
            '--btn-hover': '#bbdefb',
            '--btn-active': '#2e7d32',
            '--btn-active-border': '#1b5e20',
            canvasBg: '#e8f5e9',
            gridColor: 'rgba(0,0,0,0.08)',
            snakeHead: '#2e7d32',
            snakeBody: (ratio) => {
                const g = Math.floor(180 * ratio);
                return 'rgb(' + Math.floor(g * 0.3) + ',' + g + ',' + Math.floor(g * 0.3) + ')';
            },
            rabbitBody: '#8d6e63',
            rabbitHead: '#8d6e63',
            rabbitEars: '#6d4c41',
            rabbitInnerEars: '#ffab91',
            rabbitEyes: '#333',
            rabbitNose: '#e57373',
            rabbitTail: '#fff',
            eyeWhite: '#fff',
            eyePupil: '#111'
        }
    };

    let currentTheme = localStorage.getItem('snakeTheme') || 'night';
    let snake, dir, nextDir, rabbits, score, level, timeLeft;
    let gameState, lastMove, timerHandle, animFrame;

    function applyTheme(themeName) {
        currentTheme = themeName;
        localStorage.setItem('snakeTheme', themeName);
        const theme = themes[themeName];
        const root = document.documentElement;
        for (const [key, value] of Object.entries(theme)) {
            if (key.startsWith('--')) {
                root.style.setProperty(key, value);
            }
        }
        // Update button states
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.theme === themeName);
        });
        // Redraw if game is active
        if (gameState === 'playing') {
            draw();
        } else {
            drawBackground();
        }
    }

    function init() {
        score = 0;
        level = 1;
        timeLeft = BASE_TIME;
        gameState = 'start';
        applyTheme(currentTheme);
        updateUI();
        drawBackground();
    }

    function startLevel() {
        const cx = Math.floor(GRID / 2);
        const cy = Math.floor(GRID / 2);
        snake = [
            { x: cx, y: cy },
            { x: cx - 1, y: cy },
            { x: cx - 2, y: cy }
        ];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        timeLeft = Math.max(MIN_TIME, BASE_TIME - (level - 1) * TIME_DECREASE);
        placeRabbits();
        gameState = 'playing';
        lastMove = 0;
        updateUI();
        hideOverlay();

        clearInterval(timerHandle);
        timerHandle = setInterval(tick, 1000);

        cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(gameLoop);
    }

    function placeRabbits() {
        rabbits = [];
        while (rabbits.length < RABBIT_COUNT) {
            const p = {
                x: Math.floor(Math.random() * GRID),
                y: Math.floor(Math.random() * GRID)
            };
            if (!onSnake(p) && !onRabbit(p)) rabbits.push(p);
        }
    }

    function onSnake(p) {
        return snake.some(s => s.x === p.x && s.y === p.y);
    }

    function onRabbit(p) {
        return rabbits.some(r => r.x === p.x && r.y === p.y);
    }

    function tick() {
        if (gameState !== 'playing') return;
        timeLeft--;
        updateUI();
        if (timeLeft <= 0) endGame('time');
    }

    function gameLoop(ts) {
        if (gameState !== 'playing') return;
        if (ts - lastMove >= MOVE_INTERVAL) {
            dir = { ...nextDir };
            if (!moveSnake()) return;
            lastMove = ts;
        }
        draw();
        animFrame = requestAnimationFrame(gameLoop);
    }

    function moveSnake() {
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
            endGame('wall');
            return false;
        }
        if (onSnake(head)) {
            endGame('self');
            return false;
        }

        snake.unshift(head);

        const ri = rabbits.findIndex(r => r.x === head.x && r.y === head.y);
        if (ri !== -1) {
            rabbits.splice(ri, 1);
            score += 10 * level;
            updateUI();
            if (rabbits.length === 0) {
                levelUp();
                return false;
            }
        } else {
            snake.pop();
        }
        return true;
    }

    function levelUp() {
        clearInterval(timerHandle);
        cancelAnimationFrame(animFrame);
        gameState = 'levelup';
        level++;
        const nextTime = Math.max(MIN_TIME, BASE_TIME - (level - 1) * TIME_DECREASE);
        draw();
        showOverlay(
            'Level ' + level + '!',
            'Time: ' + nextTime + 's',
            'Press SPACE to continue'
        );
    }

    function endGame(reason) {
        clearInterval(timerHandle);
        cancelAnimationFrame(animFrame);
        gameState = 'gameover';
        draw();
        const reasons = { wall: 'Hit a wall!', self: 'Ate yourself!', time: 'Time\'s up!' };
        showOverlay(
            reasons[reason] || 'Game Over',
            'Score: ' + score + '  |  Level: ' + level,
            'Press SPACE to restart'
        );
    }

    function showOverlay(title, detail, action) {
        overlayEl.innerHTML =
            '<h1>' + title + '</h1>' +
            '<p class="highlight">' + detail + '</p>' +
            '<p class="action">' + action + '</p>';
        overlayEl.classList.remove('hidden');
    }

    function hideOverlay() {
        overlayEl.classList.add('hidden');
    }

    // --- Drawing ---

    function drawBackground() {
        const theme = themes[currentTheme];
        ctx.fillStyle = theme.canvasBg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid();
    }

    function drawGrid() {
        const theme = themes[currentTheme];
        ctx.strokeStyle = theme.gridColor;
        ctx.lineWidth = 1;
        for (let i = 1; i < GRID; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL, 0);
            ctx.lineTo(i * CELL, GRID * CELL);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * CELL);
            ctx.lineTo(GRID * CELL, i * CELL);
            ctx.stroke();
        }
    }

    function draw() {
        const theme = themes[currentTheme];
        ctx.fillStyle = theme.canvasBg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        drawRabbits();
        drawSnake();
    }

    function drawRabbits() {
        const theme = themes[currentTheme];
        for (const r of rabbits) {
            const cx = r.x * CELL + CELL / 2;
            const cy = r.y * CELL + CELL / 2;

            // Body
            ctx.fillStyle = theme.rabbitBody;
            ctx.beginPath();
            ctx.ellipse(cx, cy + 2, 8, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            // Head
            ctx.fillStyle = theme.rabbitHead;
            ctx.beginPath();
            ctx.arc(cx, cy - 4, 5, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.fillStyle = theme.rabbitEars;
            ctx.beginPath();
            ctx.ellipse(cx - 3, cy - 11, 2, 5, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 3, cy - 11, 2, 5, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Inner ears
            ctx.fillStyle = theme.rabbitInnerEars;
            ctx.beginPath();
            ctx.ellipse(cx - 3, cy - 11, 1, 3, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 3, cy - 11, 1, 3, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = theme.rabbitEyes;
            ctx.beginPath();
            ctx.arc(cx - 2, cy - 5, 1.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 2, cy - 5, 1.2, 0, Math.PI * 2);
            ctx.fill();

            // Nose
            ctx.fillStyle = theme.rabbitNose;
            ctx.beginPath();
            ctx.arc(cx, cy - 3, 1, 0, Math.PI * 2);
            ctx.fill();

            // Tail
            ctx.fillStyle = theme.rabbitTail;
            ctx.beginPath();
            ctx.arc(cx + 1, cy + 9, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawSnake() {
        const theme = themes[currentTheme];
        for (let i = snake.length - 1; i >= 0; i--) {
            const seg = snake[i];
            const isHead = i === 0;
            const ratio = 1 - (i / Math.max(snake.length, 1)) * 0.5;
            ctx.fillStyle = isHead ? theme.snakeHead : theme.snakeBody(ratio);

            roundRect(
                seg.x * CELL + 1,
                seg.y * CELL + 1,
                CELL - 2,
                CELL - 2,
                isHead ? 6 : 4
            );
            ctx.fill();

            if (isHead) drawEyes(seg);
        }
    }

    function drawEyes(seg) {
        const theme = themes[currentTheme];
        const cx = seg.x * CELL + CELL / 2;
        const cy = seg.y * CELL + CELL / 2;
        const offsets = {
            '1,0':  [[ 5, -5], [ 5,  5]],
            '-1,0': [[-5, -5], [-5,  5]],
            '0,-1': [[-5, -5], [ 5, -5]],
            '0,1':  [[-5,  5], [ 5,  5]]
        };
        const key = dir.x + ',' + dir.y;
        const eyes = offsets[key] || offsets['1,0'];

        for (const [ox, oy] of eyes) {
            ctx.fillStyle = theme.eyeWhite;
            ctx.beginPath();
            ctx.arc(cx + ox, cy + oy, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = theme.eyePupil;
            ctx.beginPath();
            ctx.arc(cx + ox + dir.x * 1.2, cy + oy + dir.y * 1.2, 1.8, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function updateUI() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        timerEl.textContent = 'Time: ' + m + ':' + String(s).padStart(2, '0');
        timerEl.className = timeLeft <= 10 ? 'warning' : '';
        scoreEl.textContent = 'Score: ' + score;
        levelEl.textContent = 'Level: ' + level;
        rabbitsEl.textContent = 'Rabbits: ' + rabbits.length;
    }

    // --- Input ---

    document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            if (gameState === 'start' || gameState === 'gameover') {
                score = 0;
                level = 1;
                startLevel();
            } else if (gameState === 'levelup') {
                startLevel();
            }
            return;
        }
        if (gameState !== 'playing') return;

        const moves = {
            ArrowUp:    { x:  0, y: -1, block: { x:  0, y:  1 } },
            ArrowDown:  { x:  0, y:  1, block: { x:  0, y: -1 } },
            ArrowLeft:  { x: -1, y:  0, block: { x:  1, y:  0 } },
            ArrowRight: { x:  1, y:  0, block: { x: -1, y:  0 } }
        };
        const m = moves[e.key];
        if (m && !(dir.x === m.block.x && dir.y === m.block.y)) {
            nextDir = { x: m.x, y: m.y };
            e.preventDefault();
        }
    });

    // Theme button event listeners
    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            applyTheme(btn.dataset.theme);
        });
    });

    init();
})();
</script>
</body>
</html>
